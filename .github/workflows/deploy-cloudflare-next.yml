name: Deploy to Cloudflare Pages (Next.js)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare for Cloudflare Pages (next-on-pages)
        run: npx @cloudflare/next-on-pages@latest --outdir out

      # Publishing is handled by Cloudflare Pages directly (connected repo).
      # Removed the `wrangler` publish step to avoid requiring CF_API_TOKEN/CF_PROJECT_NAME.
