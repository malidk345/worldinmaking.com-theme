name: Deploy to Cloudflare Pages (Next.js)

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare for Cloudflare Pages (next-on-pages)
        run: npx @cloudflare/next-on-pages@latest --outdir out

      - name: Publish to Cloudflare Pages (wrangler)
        uses: cloudflare/wrangler-action@2.0.0
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: >-
            pages deploy ./out --project-name ${{ secrets.CF_PROJECT_NAME }} --branch ${{ github.ref_name }}
