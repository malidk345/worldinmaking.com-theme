packages:
    - .
    - plugins/*

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
    - '@posthog/brand'
    - '@posthog/icons'
    - '@posthog/hedgehog-mode'
    - '@typecaast/react'
    - '@typecaast/core'
    - '@typecaast/schema'
    - '@typecaast/skin-kit'
    - '@typecaast/skins'
blockExoticSubdeps: true
trustPolicy: no-downgrade

# Hoist Gatsby's internal dependencies for webpack compatibility
publicHoistPattern:
    - '*webpack-hot-middleware*'
    - '*error-stack-parser*'
    - '*platform*'
    - '*css.escape*'
    - '*anser*'
