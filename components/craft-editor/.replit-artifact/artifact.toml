kind = "web"
previewPath = "/"
title = "Craft Editor"
version = "1.0.0"
id = "artifacts/craft-editor"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19527

[services.development]
run = "pnpm --filter @workspace/craft-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/craft-editor", "run", "build" ]
serve = "static"
publicDir = "artifacts/craft-editor/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19527"
BASE_PATH = "/"
